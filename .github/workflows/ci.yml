name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint, typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Repo structure check
        run: |
          set -e
          allowed='^(\.git|\.gitignore|\.githooks|\.maintenance-state|\.prettierrc|\.prettierignore|\.vercel|CLAUDE\.md|MAINTENANCE\.md|DECISIONS\.md|claude-design\.md|\.github|\.claude|docs|data|design_handoff|features|engine|app|archive|scripts|package\.json|package-lock\.json|tsconfig\.json|tsconfig\.base\.json|eslint\.config\.js|vercel\.json|node_modules)$'
          fail=0
          for entry in $(ls -A); do
            if ! echo "$entry" | grep -E "$allowed" > /dev/null; then
              echo "Unexpected root entry: $entry"
              fail=1
            fi
          done
          exit $fail

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Bake engine library and history from data/*.md
        run: npm run bake

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build frontend
        run: npm run build --workspace @plantry/web

      - name: Test engine
        run: npm test --workspace @plantry/engine
