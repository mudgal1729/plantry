name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Placeholder workflow. Real gates land with the streams:
#   - Stream A: round-trip parser tests for data/dishes.md and data/ingredients.md.
#   - Stream B: engine type-check, unit tests, simulation harness, property tests.
#   - Stream C: Convex schema codegen + typecheck.
#   - Stream D: Vite build + service worker bundle.
#   - Stream E: spec/code parity check (docs/engine.md must be touched alongside engine/).
#   - Repo structure consistency check (per docs/engineering.md §14).
#
# Until those streams land, this workflow runs only the structure check stub
# so we have a working CI surface to attach gates to.

jobs:
  structure:
    name: Repo structure consistency (stub)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check root inventory
        run: |
          set -e
          allowed='^(\.gitignore|\.maintenance-state|CLAUDE\.md|MAINTENANCE\.md|DECISIONS\.md|\.github|\.claude|docs|data|features|engine|app|archive)$'
          fail=0
          for entry in $(ls -A); do
            if ! echo "$entry" | grep -E "$allowed" > /dev/null; then
              echo "Unexpected root entry: $entry"
              fail=1
            fi
          done
          exit $fail
