name: Deploy Convex

on:
  push:
    branches: [main]
    paths:
      - "app/convex/**"
      - "engine/**"
      - "data/**"
      - ".github/workflows/deploy-convex.yml"

# Only one Convex deploy at a time per branch. If a newer commit lands while a
# deploy is running, cancel the in-progress one and run the latest.
concurrency:
  group: convex-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy schema and functions to production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node 20
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Bake engine library and history from data/*.md
        # Convex bundles the deployed code; engine/src/data/library.ts and history.ts
        # are gitignored generated files imported by app/convex/generateWeek.ts.
        # Without baking first, the deploy bundler cannot resolve the engine subpath imports.
        run: npm run bake

      - name: Deploy to Convex prod
        working-directory: app/convex
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex deploy --yes
